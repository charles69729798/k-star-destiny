services:
  nginx:
    image: nginx:stable-alpine
    container_name: sajuapp-gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    depends_on:
      - backend
      - frontend
    networks:
      - saju-net
    restart: always

  certbot:
    image: certbot/certbot
    container_name: sajuapp-certbot
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done'"
    networks:
      - saju-net
    restart: always

  backend:
    build: ./backend
    container_name: sajuapp-backend
    ports:
      - "8000:8000"
    environment:
      - ENV=production
    volumes:
      - ./backend:/app
    networks:
      - saju-net
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: sajuapp-frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - saju-net
    restart: always

networks:
  saju-net:
    driver: bridge
